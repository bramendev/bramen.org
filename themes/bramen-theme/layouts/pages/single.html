{{ define "main" }}
<article>
    <header class="article-header">
        <div class="container">
            <h1 class="section-title" style="font-size: clamp(2rem, 4vw, 3rem);">{{ .Title }}</h1>
        </div>
    </header>
    
    <div class="article-body">
        {{ .Content }}
    </div>
</article>
{{ end }}
