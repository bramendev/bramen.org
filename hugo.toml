title = "Brayan Herrera - Developer & Content Creator"
baseURL = "https://bramen.org/"
languageCode = "es"
defaultContentLanguage = "es"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = true
theme = "bramen-theme"

# Allow raw HTML in markdown content
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Permalinks
[permalinks]
  tutorials = "/tutorials/:slug/"

# Menu
[menu]
  [[menu.main]]
    identifier = "home"
    name = "Inicio"
    pageRef = "/"
    weight = 10
  [[menu.main]]
    identifier = "tutorials"
    name = "Tutoriales"
    pageRef = "/tutorials"
    weight = 20
  [[menu.main]]
    identifier = "youtube"
    name = "YouTube"
    url = "https://www.youtube.com/@BramenDev"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "Acerca de"
    pageRef = "/about"
    weight = 40

# Default parameters
[params]
  author = "Brayan Herrera"
  description = "Desarrollador, creador de contenido y apasionado por la tecnología"
  keywords = "tutoriales, programación, youtube, tecnología, bramen.org"
  # YouTube
  youtubeChannel = "@BramenDev"
  # Social
  github = "https://github.com/bramen"
  twitter = "https://twitter.com/BramenDev"
  # Colors - Tech/Dark theme
  primaryColor = "#00bcd4"
  secondaryColor = "#7c4dff"
  accentColor = "#00e676"
  # Font
  fontFamily = "'Ubuntu', sans-serif"

[outputs]
  home = ["HTML", "RSS", "JSON"]
